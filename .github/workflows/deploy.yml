# .github/workflows/deploy.yml
# tcmb-rezerv-api Worker — CI + deploy (Faz 1-2)
# NOT (Faz 2): node-version 22 — `node --test --experimental-strip-types` testleri
# Node >= 22.6 gerektirir (Node 20'de tip-sıyırma yok). Smoke artık /api/weekly +
# /api/summary (günlük nowcast) yapısal kontrolü yapar.
# Secrets (repo → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (yeni, dar kapsam: Workers Scripts:Edit + Workers KV:Edit)
#   CLOUDFLARE_ACCOUNT_ID
# Variable:
#   REZERV_API_URL         (deploy sonrası smoke testi için, ör. https://tcmb-rezerv-api.<sub>.workers.dev)
# NOT: TCMB_EVDS_KEY CI'a GİRMEZ — Worker secret'ı olarak kalır (wrangler secret put), deploy'lar arası korunur.

name: deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm run lint --if-present
      - name: Test
        run: pnpm run test --if-present
      - name: Build doğrulama (deploy etmeden)
        run: pnpm exec wrangler deploy --dry-run --outdir=dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy (wrangler)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Canlı /api/weekly kabul testi
        run: |
          BASE="${{ vars.REZERV_API_URL }}"
          if [ -z "$BASE" ]; then echo "REZERV_API_URL tanımlı değil — smoke atlanıyor"; exit 0; fi
          echo "GET $BASE/api/weekly?start=01-10-2025"
          BODY=$(curl -fsS "$BASE/api/weekly?start=01-10-2025")
          # 12-06-2026 toplam ~152.08 mlr olmalı (tarihsel, sabit kabul değeri)
          V=$(echo "$BODY" | jq -r '.weekly[] | select(.tarih=="2026-06-12") | .toplam')
          echo "12-06-2026 toplam = $V"
          awk -v v="$V" 'BEGIN{ if (v=="" || v<151 || v>153){ print "KABUL TESTI BASARISIZ"; exit 1 } else { print "OK" } }'
      - name: Canlı /api/summary yapısal smoke (Faz 2 — günlük nowcast)
        run: |
          BASE="${{ vars.REZERV_API_URL }}"
          if [ -z "$BASE" ]; then echo "REZERV_API_URL tanımlı değil — smoke atlanıyor"; exit 0; fi
          echo "GET $BASE/api/summary?weeklyStart=01-10-2025"
          SUM=$(curl -fsS "$BASE/api/summary?weeklyStart=01-10-2025")
          # Yapısal kontrol (kesin nowcast değeri ÇIPA ile haftalık kayar → offline unit testte
          # sabitlenir; canlı smoke yalnız sözleşmeyi doğrular).
          echo "$SUM" | jq -e '(.weekly|length>0) and (.daily|length>0)' >/dev/null
          echo "$SUM" | jq -e '.meta.anchorDate and (.meta.anchorBrut|type=="number") and .meta.peak.tarih' >/dev/null
          echo "$SUM" | jq -e '(.daily[-1].brutRezerv|type=="number") and (.daily[-1]|has("nir"))' >/dev/null
          echo "summary OK — çıpa $(echo "$SUM" | jq -r .meta.anchorDate), son brüt $(echo "$SUM" | jq -r .daily[-1].brutRezerv)"
