name = "tcmb-rezerv-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Faz 1-2 yapılandırması (env/var). Secret ayrı: `wrangler secret put TCMB_EVDS_KEY`.
[vars]
WEEKLY_TTL = "21600"            # haftalık cache TTL (~6 saat) — /api/weekly
DAILY_TTL = "3600"              # günlük/summary cache TTL (~1 saat) — /api/summary
STALE_TTL = "1209600"           # son-bilinen-iyi fallback TTL (~14 gün) — EVDS bakım/kesintisinde sunulur
DEFAULT_WEEKLY_START = "01-10-2025"
YABANCI_MB_FALLBACK = "16.4"    # Yabancı MB swap fallback (mlr USD) — DOVVARNC.K18 çekilemezse (Faz 5)

# KV cache. id'yi `wrangler kv namespace create REZERV_CACHE` çıktısıyla doldur.
[[kv_namespaces]]
binding = "REZERV_CACHE"
id = "7cadc8955a4647eb9b2f35fc40a032a7"
# preview_id = "REPLACE_WITH_PREVIEW_KV_ID"   # `wrangler dev` için (opsiyonel)

# Faz 4 — Cron ön-ısıtma (M-005, src/scheduled.ts). Saatler UTC (TR = UTC+3).
# scheduled() handler summary + weekly cache anahtarını (UI'nin düştüğü anahtarlar)
# tazeler → kullanıcı (ve CI smoke) hep SICAK cache'e düşer. Public sözleşme DEĞİŞMEZ.
# Mütevazı sıklık — EVDS dövülmez (~16 tetik/hafta):
#   "0 8,12,16 * * 1-5" : hafta içi (Pzt-Cum) 08/12/16 UTC = 11/15/19 TR — analitik
#                         bilanço / iş günü (A02/A10/USD) yayımını yakalar.
#   "0 17 * * 5"        : Cuma 17 UTC = 20 TR — haftalık brüt rezerv (Cuma) yayımı.
[triggers]
crons = ["0 8,12,16 * * 1-5", "0 17 * * 5"]
