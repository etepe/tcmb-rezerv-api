name = "tcmb-rezerv-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Faz 1-2 yapılandırması (env/var). Secret ayrı: `wrangler secret put TCMB_EVDS_KEY`.
[vars]
WEEKLY_TTL = "21600"            # haftalık cache TTL (~6 saat) — /api/weekly
DAILY_TTL = "3600"              # günlük/summary cache TTL (~1 saat) — /api/summary
DEFAULT_WEEKLY_START = "01-10-2025"

# KV cache. id'yi `wrangler kv namespace create REZERV_CACHE` çıktısıyla doldur.
[[kv_namespaces]]
binding = "REZERV_CACHE"
id = "7cadc8955a4647eb9b2f35fc40a032a7"
# preview_id = "REPLACE_WITH_PREVIEW_KV_ID"   # `wrangler dev` için (opsiyonel)
